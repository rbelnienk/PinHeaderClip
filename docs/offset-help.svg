<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300"
     font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img"
     aria-label="Offset is the distance from the PCB board edge to the pin header">
  <defs>
    <!-- fixed pixel size (not scaled by stroke-width) and refX at the tip,
         so the arrowhead's point lands exactly on the line it's attached to
         instead of straddling past it -->
    <marker id="ah" markerUnits="userSpaceOnUse" markerWidth="16" markerHeight="15"
            refX="16" refY="7.5" orient="auto-start-reverse">
      <path d="M0,0 L16,7.5 L0,15 Z" fill="#ffffff" stroke="#0a0a0a" stroke-width="1.4" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- outside the board -->
  <rect width="640" height="300" fill="#141414"/>
  <!-- PCB -->
  <rect width="640" height="215" fill="#1faa1f"/>

  <!-- mounting hole -->
  <circle cx="105" cy="105" r="58" fill="#e8e8b0" stroke="#2a2a2a" stroke-width="2"/>
  <circle cx="105" cy="105" r="30" fill="#1a1a1a"/>

  <!-- pin header body -->
  <rect x="200" y="45" width="420" height="125" fill="#5a5f66" stroke="#22262b" stroke-width="2"/>

  <!-- pads: two rows of 7 -->
  <g fill="#d4a017" stroke="#6b5210" stroke-width="2">
    <rect x="224" y="77" width="22" height="22"/><rect x="284" y="77" width="22" height="22"/>
    <rect x="344" y="77" width="22" height="22"/><rect x="404" y="77" width="22" height="22"/>
    <rect x="464" y="77" width="22" height="22"/><rect x="524" y="77" width="22" height="22"/>
    <rect x="584" y="77" width="22" height="22"/>
    <rect x="224" y="119" width="22" height="22"/><rect x="284" y="119" width="22" height="22"/>
    <rect x="344" y="119" width="22" height="22"/><rect x="404" y="119" width="22" height="22"/>
    <rect x="464" y="119" width="22" height="22"/><rect x="524" y="119" width="22" height="22"/>
    <rect x="584" y="119" width="22" height="22"/>
  </g>
  <g fill="#8a6a10">
    <rect x="230" y="83" width="10" height="10"/><rect x="290" y="83" width="10" height="10"/>
    <rect x="350" y="83" width="10" height="10"/><rect x="410" y="83" width="10" height="10"/>
    <rect x="470" y="83" width="10" height="10"/><rect x="530" y="83" width="10" height="10"/>
    <rect x="590" y="83" width="10" height="10"/>
    <rect x="230" y="125" width="10" height="10"/><rect x="290" y="125" width="10" height="10"/>
    <rect x="350" y="125" width="10" height="10"/><rect x="410" y="125" width="10" height="10"/>
    <rect x="470" y="125" width="10" height="10"/><rect x="530" y="125" width="10" height="10"/>
    <rect x="590" y="125" width="10" height="10"/>
  </g>

  <!-- PCB board edge -->
  <line x1="0" y1="215" x2="640" y2="215" stroke="#0d0d0d" stroke-width="3"/>

  <!-- dimension: header edge down to board edge (white on dark outline for contrast on the green) -->
  <line x1="55" y1="170" x2="430" y2="170" stroke="#0a0a0a" stroke-width="6" stroke-linecap="round"/>
  <line x1="55" y1="170" x2="430" y2="170" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="95" y1="170" x2="95" y2="215" stroke="#0a0a0a" stroke-width="5.5"/>
  <line x1="95" y1="170" x2="95" y2="215" stroke="#ffffff" stroke-width="2.5"
        marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="112" y="198" fill="#ffffff" font-size="18" font-weight="800"
        stroke="#0a0a0a" stroke-width="3.5" paint-order="stroke" stroke-linejoin="round">Offset</text>

  <!-- captions (below the board edge) -->
  <text x="20" y="252" fill="#ffffff" font-size="17" font-weight="600">
    Offset = distance from the PCB board edge to the pin header
  </text>
  <text x="20" y="277" fill="#9aa4b2" font-size="14">
    Measure it on your board and enter it in mm.
  </text>
</svg>
